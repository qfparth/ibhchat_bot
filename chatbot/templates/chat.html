<!DOCTYPE html>
<html>
   <head>
      <title>AI Chatbot</title>
      <meta charset="UTF-8">

      <style>


            /* AI Loading Spinner */

         .loader{
         display:flex;
         align-items:center;
         gap:8px;
         font-size:13px;
         color:#555;
         }

         .spinner{
         width:14px;
         height:14px;
         border:2px solid #ccc;
         border-top:2px solid #667eea;
         border-radius:50%;
         animation:spin 0.7s linear infinite;
         }

         @keyframes spin{
         0%{transform:rotate(0deg);}
         100%{transform:rotate(360deg);}
         }

         body{
         margin:0;
         font-family:Segoe UI,Arial;
         background:linear-gradient(135deg,#667eea,#764ba2);
         height:100vh;
         display:flex;
         justify-content:center;
         align-items:center;
         }

         /* container */

         .chat-container{
         width:100%;
         max-width:900px;
         height:95vh;
         background:white;
         border-radius:12px;
         display:flex;
         flex-direction:column;
         box-shadow:0 20px 50px rgba(0,0,0,0.3);
         overflow:hidden;
         }

         /* chat area */

         .chat-box{
         flex:1;
         overflow-y:auto;
         padding:20px;
         background:#f7f8fc;
         scroll-behavior:smooth;
         }

         /* message */

         .message{
         padding:12px 16px;
         border-radius:16px;
         margin-bottom:12px;
         max-width:70%;
         font-size:14px;
         line-height:1.5;
         animation:pop .25s ease;
         }

         /* animation */

         @keyframes pop{
         0%{opacity:0;transform:scale(.8) translateY(10px)}
         100%{opacity:1;transform:scale(1) translateY(0)}
         }

         /* user */

         .user{
         background:#25d366;
         color:white;
         margin-left:auto;
         border-bottom-right-radius:4px;
         }

         /* bot */

         .bot{
         background:white;
         border:1px solid #eee;
         border-bottom-left-radius:4px;
         }

         /* input */

         .input-area{
         display:flex;
         padding:12px;
         border-top:1px solid #eee;
         background:white;
         }

         input{
         flex:1;
         padding:12px;
         border:none;
         border-radius:25px;
         background:#f1f1f1;
         font-size:14px;
         outline:none;
         }

         button{
         margin-left:10px;
         padding:12px 20px;
         border:none;
         background:#667eea;
         color:white;
         border-radius:25px;
         cursor:pointer;
         transition:.2s;
         }

         button:hover{
         transform:scale(1.05);
         }

         /* thinking dots */

         .thinking{
         display:flex;
         align-items:center;
         gap:5px;
         font-size:13px;
         color:#666;
         }

         .dot{
         width:6px;
         height:6px;
         background:#999;
         border-radius:50%;
         animation:blink 1.2s infinite;
         }

         .dot:nth-child(2){animation-delay:.2s;}
         .dot:nth-child(3){animation-delay:.4s;}

         @keyframes blink{
         0%,80%,100%{opacity:0}
         40%{opacity:1}
         }

         /* mobile */

         @media(max-width:600px){

         .chat-container{
         height:100vh;
         border-radius:0;
         }

         .message{
         max-width:85%;
         }

         }

      </style>
   </head>

   <body>
      <div class="chat-container">
         <div class="chat-box" id="chat-box"></div>
         <div class="input-area">
            <input id="question" placeholder="Type message">
            <button onclick="sendMessage()">Send</button>
         </div>
      </div>

      <script>
         let input=document.getElementById("question")

         input.addEventListener("keypress",function(e){
         if(e.key==="Enter") sendMessage()
         })

         function sendMessage(){
         let question=input.value
         if(question.trim()=="") return
         let chatBox=document.getElementById("chat-box")

         /* user message */
         let user=document.createElement("div")
         user.className="message user"
         user.innerText=question

         chatBox.appendChild(user)

         input.value=""
         scrollBottom()

         /* bot thinking */

         let bot=document.createElement("div")
         bot.className="message bot"

         bot.innerHTML=`
         <div class="loader">
         <div class="spinner"></div>
         AI is thinking...
         </div>
         `

         chatBox.appendChild(bot)
            scrollBottom()
            fetch("/chatbot/?msg=" + encodeURIComponent(question))
            .then(res=>res.json())
            .then(data=>{
               bot.innerHTML=""
               //typeEffect(data.response,bot)
               let text = data.reply || "No response from server";
               typeEffect(text, bot)
               })
         }

         function typeEffect(text,element){
            let i=0
            let typing=setInterval(function(){
               element.innerHTML += text[i] === "\n" ? "<br>" : text[i]
               i++

               if(i>=text.length){
                  clearInterval(typing)
               }
               scrollBottom()
            },30)
         }

         function scrollBottom(){
            let chatBox=document.getElementById("chat-box")
            chatBox.scrollTop=chatBox.scrollHeight

         }

         /* function getAI(){
            let box = document.getElementById("ai-result");
            box.innerText = "AI is thinking... ⏳";

            fetch("/get-response/?question=admin improve")   // ✅ correct URL
            .then(res => res.json())
            .then(data => {
               console.log(data);
               box.innerText = data.response;   // ✅ IMPORTANT
            })
            .catch(err => {
               box.innerText = "Error ❌";
               console.error(err);
            });
         }*/
      </script>

   </body>
</html>
